# Codex Explorer Agent Profile
# Role mapping: no Anthropic equivalent (new role)
# Task: Read-only file search, codebase exploration, pattern matching, triage
# Model: gpt-4o-mini (Tier 1) — cheapest option for deterministic read-only tasks
# Cost: ~$1/M input tokens, ~$5/M output tokens
# Reasoning effort: low

[metadata]
name = "explorer"
description = "Read-only file search, codebase exploration, pattern matching, and triage. Use for finding code patterns, understanding file structure, or triaging issues without making changes."
role = "explorer"
tier = 1
model = "gpt-5.4-mini"

[reasoning]
effort = "low"
extended_thinking = false

[capabilities]
# Tools available to this agent
tools = ["Glob", "Grep", "Read", "Bash"]

# File operations
allow_write = false
allow_delete = false
allow_create = false
sandbox = "read-only"

# Sandbox configuration
[sandbox]
read_only_mode = true
allow_file_read = true
allow_network = false
allow_external_http = false

[context]
# Context window expectations for this agent (Tier 1)
max_context_files = 2
max_context_size_kb = 50
target_token_budget = 2000

[examples]
# Example use cases for explorer agent
example_1 = "Find all .ts files containing a specific function name"
example_2 = "List recent changes to a package.json file"
example_3 = "Search for TODO comments in the codebase"
example_4 = "Understand the file tree structure of a specific package"
example_5 = "Triage a test failure by finding related code"
