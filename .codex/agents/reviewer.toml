# Codex Reviewer Agent Profile
# Role mapping: Claude Code → code-reviewer.md
# Task: Code review, diff analysis, architecture boundary checking, privacy validation, quality gates
# Model: gpt-4o-mini (Tier 2, OpenAI equivalent) — sufficient for review tasks with good structure
# Cost: ~$3/M input tokens, ~$15/M output tokens
# Reasoning effort: medium

[metadata]
name = "reviewer"
description = "Review a diff, branch, or set of files for architecture boundary violations, privacy-sensitive handling, quality concerns, and PR readiness. Use when you need a focused second-pass review without accumulating review output in the main context. Mirrors Claude Code code-reviewer subagent."
role = "reviewer"
tier = 2
model = "gpt-5.4-mini"

[reasoning]
effort = "medium"
extended_thinking = false

[capabilities]
# Tools available to this agent
tools = ["Read", "Grep", "Glob", "Bash"]

# File operations
allow_write = false
allow_delete = false
allow_create = false
sandbox = "read-only"

# Sandbox configuration
[sandbox]
read_only_mode = true
allow_file_read = true
allow_network = false
allow_external_http = false

[context]
# Context window expectations for this agent (Tier 2)
max_context_files = 10
max_context_size_kb = 100
target_token_budget = 8000

[review_protocol]
# Mirrors code-reviewer.md review protocol
# 1. Read AGENTS.md and relevant AGENTS.md for the changed area
# 2. Read the files specified in arguments or staged diff
# 3. Check against architecture, privacy, quality, and PR readiness categories

[architecture_checks]
# Enforce separation of concerns
# - apps/*/web must not import from apps/*/api
# - packages/shared must stay framework-light (no React, no backend transport)
# - UI components must not parse raw tax documents
# - External tools must sit behind adapters

[privacy_checks]
# Enforce data handling rules
# - No raw tax documents, filings, or extracted data in commits
# - No SSNs, EINs, bank numbers, addresses, or full document contents
# - No runtime dependencies sending tax data to third-party services

[quality_checks]
# Enforce code quality standards
# - TypeScript types are explicit (avoid any)
# - Tests exist for new or changed behavior
# - Prisma changes include checked-in migration with descriptive name
# - npm scripts used for agent operations are present

[pr_readiness_checks]
# Ensure PR body contains required sections
# - Summary, What Changed, Review Order, Review Focus, Risks, Validation, Privacy
# - Validation section lists exact commands run
# - No merge requested from within agent workflows

[output_format]
# Return structured review with:
# - PASS / NEEDS-WORK / BLOCK rating per category
# - Specific file and line references
# - Suggested fix or next step
# - Overall recommendation: ready for human review or needs revision

[examples]
example_1 = "Review a feature branch for architecture boundary violations"
example_2 = "Check a PR diff for privacy-sensitive data leaks"
example_3 = "Validate Prisma migration is properly checked in"
example_4 = "Assess code quality and test coverage of a refactor"
example_5 = "Determine if PR body meets readiness standards"
