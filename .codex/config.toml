# Codex CLI Configuration
# Configures Codex (OpenAI CLI) for multi-agent workflows with custom agent profiles.
# Configuration as of 2026-03-19.

# Default model for tasks not covered by a named agent profile
model = "gpt-5.4-mini"

# Default reasoning effort
model_reasoning_effort = "low"

# Global agent limits
[agents]
max_threads = 4
max_depth = 3

# Named agent role registrations — each points to a profile under .codex/agents/
[agents.explorer]
description = "Read-only file search, codebase exploration, pattern matching, and triage."
config_file = "./agents/explorer.toml"

[agents.reviewer]
description = "Review diffs and files for architecture violations, privacy issues, quality concerns, and PR readiness."
config_file = "./agents/reviewer.toml"

[agents.research]
description = "Fetch and summarize external documentation with dated, source-ranked citations."
config_file = "./agents/research.toml"

[agents.implementer]
description = "Implement features, write code changes, refactor existing code, and add tests."
config_file = "./agents/implementer.toml"
