name: PR Hygiene

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions: {}

concurrency:
  group: pr-hygiene-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-description:
    name: pr-description
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required pull request sections
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const pullRequest = event.pull_request;

          if (!pullRequest) {
            console.error('Expected a pull_request payload.');
            process.exit(1);
          }

          if (pullRequest.draft) {
            console.log('Draft pull request detected. Skipping PR template enforcement until ready for review.');
            process.exit(0);
          }

          const requiredSections = [
            '## Summary',
            '## What Changed',
            '## Review Order',
            '## Review Focus',
            '## Risks',
            '## Validation',
            '## Privacy'
          ];
          const body = pullRequest.body ?? '';
          const missingSections = requiredSections.filter((section) => !body.includes(section));

          if (missingSections.length > 0) {
            console.error(`Pull request description is missing required sections: ${missingSections.join(', ')}`);
            process.exit(1);
          }

          console.log('Pull request description includes all required sections.');
          NODE
